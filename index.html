<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>에너지 가디언즈 통합 AR 도감</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #guide-msg {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); padding: 8px 18px; border-radius: 20px;
            font-size: 13px; font-weight: bold; z-index: 99999; border: 2px solid #2a75bb; font-family: sans-serif;
        }
        
        #ui-container {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 460px; background: rgba(15, 15, 15, 0.96); color: white;
            padding: 15px; border-radius: 16px; font-family: sans-serif;
            z-index: 99999; display: none; box-shadow: 0px 5px 25px rgba(0,0,0,0.7);
            max-height: 80vh; overflow-y: auto; box-sizing: border-box;
        }

        .content-card {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        .squirtle-color { color: #4ba3e3; }
        .charmander-color { color: #ff5757; }
        
        .img-flex-box { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
        .ui-preview-img { width: 49%; height: 110px; object-fit: contain; border-radius: 6px; background: #222; border: 1px solid rgba(255,255,255,0.2); }
        .ui-desc { font-size: 12.5px; line-height: 1.5; text-align: justify; color: #e0e0e0; margin: 0; }
        
        .action-btn { 
            background: #ffcb05; border: 2px solid #2a75bb; color: #1d2c5e; padding: 10px 0; 
            border-radius: 25px; width: 100%; font-weight: bold; font-size: 14px; cursor: pointer;
            margin-top: 5px; box-sizing: border-box;
        }
        .action-btn.completed {
            background: #10b981; border: 2px solid #047857; color: white; cursor: default;
        }

        #all-done-box {
            background: linear-gradient(135deg, #ffd700, #ff8800); color: #111;
            padding: 10px; border-radius: 10px; text-align: center; font-weight: bold;
            font-size: 15px; margin-bottom: 12px; animation: pulse 1.5s infinite;
            border: 2px solid #fff; display: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="guide-msg">Hiro(꼬부기) 또는 Kanji(파이리) 마커를 카메라에 비춰주세요!</div>

    <div id="ui-container">
        <div id="all-done-box">🎉 [종합 에너지 도감] 모든 학습 완료! 스크린샷을 찍으세요! 🎉</div>
        <div id="dynamic-content-area"></div>
        <button id="action-btn" class="action-btn" onclick="handleLearningClick()">💛 학습 완료</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro" id="marker-hiro"></a-marker>
        <a-marker preset="kanji" id="marker-kanji"></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const uiContainer = document.querySelector('#ui-container');
        const guideMsg = document.querySelector('#guide-msg');
        const contentArea = document.querySelector('#dynamic-content-area');
        const actionBtn = document.querySelector('#action-btn');
        const allDoneBox = document.querySelector('#all-done-box');

        let currentActive = null; 
        let statusCheck = { squirtle: false, charmander: false };
        let isAllCompleted = false; // 오직 두 마리 다 완료되었을 때만 true가 되는 플래그

        const cardsHTML = {
            squirtle: `
                <div class="content-card" id="card-squirtle">
                    <div class="card-title squirtle-color">💧 꼬부기 × 소양강 수력 발전소</div>
                    <div class="img-flex-box">
                        <img class="ui-preview-img" src="./squirtle.png">
                        <img class="ui-preview-img" src="./hydro.png">
                    </div>
                    <p class="ui-desc">강력한 물줄기를 발사하는 꼬부기처럼, 수력 발전소는 높은 곳에서 쏟아지는 물의 강력한 위치 에너지를 이용하여 수차 터빈을 회전시켜 전기를 생산합니다.</p>
                </div>
            `,
            charmander: `
                <div class="content-card" id="card-charmander">
                    <div class="card-title charmander-color">🔥 파이리 × 당진 화력 발전소</div>
                    <div class="img-flex-box">
                        <img class="ui-preview-img" src="./charmander.png">
                        <img class="ui-preview-img" src="./thermal.png">
                    </div>
                    <p class="ui-desc">파이리의 강력한 불꽃 열에너지처럼, 화력 발전소는 연료를 연소할 때 발생하는 고온의 열로 물을 끓여 고압의 증기를 만들고 터빈을 돌려 전력을 생산합니다.</p>
                </div>
            `
        };

        // [마커 1] Hiro 인식 -> 꼬부기
        document.querySelector('#marker-hiro').addEventListener('markerFound', () => {
            if (isAllCompleted) return; // 두 마리 모두 완료되었다면 화면 고정 상태 유지
            
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            currentActive = 'squirtle';
            contentArea.innerHTML = cardsHTML.squirtle;
            updateButtonState('squirtle');
        });

        // [마커 2] Kanji 인식 -> 파이리
        document.querySelector('#marker-kanji').addEventListener('markerFound', () => {
            if (isAllCompleted) return; // 두 마리 모두 완료되었다면 화면 고정 상태 유지
            
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            currentActive = 'charmander';
            contentArea.innerHTML = cardsHTML.charmander;
            updateButtonState('charmander');
        });

        // 🚨 [핵심 수정] 마커를 치웠을 때 처리 함수
        function handleMarkerLost() {
            // 두 마리 모두 완료(isAllCompleted가 true) 되었을 때만 화면을 숨기지 않고 "진짜 멈춤(박제)"
            if (isAllCompleted) return; 

            // 그전에는 꼬부기나 파이리 하나만 완료했더라도 마커 치우면 무조건 즉시 화면 사라짐!
            uiContainer.style.display = 'none';
            guideMsg.style.display = 'block';
            currentActive = null;
        }

        document.querySelector('#marker-hiro').addEventListener('markerLost', handleMarkerLost);
        document.querySelector('#marker-kanji').addEventListener('markerLost', handleMarkerLost);

        // 버튼 상태 업데이트
        function updateButtonState(type) {
            if (statusCheck[type]) {
                actionBtn.innerText = "✔ 학습 완료됨";
                actionBtn.className = "action-btn completed";
            } else {
                actionBtn.innerText = "💛 학습 완료";
                actionBtn.className = "action-btn";
            }
        }

        // [학습 완료] 버튼 클릭 핸들러
        function handleLearningClick() {
            if (!currentActive || statusCheck[currentActive]) return;

            statusCheck[currentActive] = true;
            if (currentActive === 'squirtle') {
                alert("💧 꼬부기 & 소양강 수력 발전소 학습이 완료되었습니다!");
            } else if (currentActive === 'charmander') {
                alert("🔥 파이리 & 당진 화력 발전소 학습이 완료되었습니다!");
            }

            // 꼬부기와 파이리 '둘 다' 완료했는지 실시간 체크
            if (statusCheck.squirtle && statusCheck.charmander) {
                isAllCompleted = true; // 최종 잠금장치 ON!!
                allDoneBox.style.display = "block";
                contentArea.innerHTML = cardsHTML.squirtle + cardsHTML.charmander; // 꼬부기 + 파이리 뷰 합체
                actionBtn.style.display = "none"; // 하단 버튼 숨김
                guideMsg.style.display = 'none';
                alert("🎉 축하합니다! 모든 발전소 에너지 학습을 마쳤습니다. 도감이 통합되며 화면이 고정됩니다.");
            } else {
                updateButtonState(currentActive);
            }
        }
    </script>
</body>
</html>
