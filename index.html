<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>에너지 가디언즈 AR 도감</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #guide-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 20px; border-radius: 25px;
            font-size: 14px; font-weight: bold; z-index: 9999; border: 2px solid #2a75bb; font-family: sans-serif;
        }
        #ui-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 440px; background: rgba(15, 15, 15, 0.95); color: white;
            padding: 18px; border-radius: 16px; font-family: sans-serif;
            z-index: 9999; display: none; box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
        }
        #ui-title { font-size: 19px; font-weight: bold; margin-bottom: 12px; color: #ffcb05; text-align: center; }
        .img-flex-box { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .ui-preview-img { width: 48%; height: 125px; object-fit: contain; border-radius: 8px; background: #222; border: 1.5px solid rgba(255,255,255,0.3); }
        #ui-desc { font-size: 13.5px; line-height: 1.55; margin-bottom: 14px; text-align: justify; color: #f0f0f0; }
        
        /* 💛 다시 살려낸 노란색 [학습 완료] 버튼 */
        #learning-btn { 
            background: #ffcb05; border: 2px solid #2a75bb; color: #1d2c5e; padding: 12px 0; 
            border-radius: 25px; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer;
            transition: all 0.2s ease;
        }
        /* 클릭 후 완료되었을 때 초록색으로 변경되는 효과 (화면 유지) */
        #learning-btn.completed {
            background: #10b981; border: 2px solid #047857; color: white;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="guide-msg">Hiro 또는 Kanji 마커를 비춰주세요!</div>

    <div id="ui-container">
        <div id="ui-title">발전소 분석 데이터</div>
        <div class="img-flex-box">
            <img id="pop-pokemon-img" class="ui-preview-img" src="">
            <img id="pop-factory-img" class="ui-preview-img" src="">
        </div>
        <div id="ui-desc">데이터 로딩 중...</div>
        
        <button id="learning-btn" onclick="completeLearning()">💛 학습 완료</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="charmander-card" src="./charmander.png">
            <img id="thermal-photo" src="./thermal.png">
            <img id="squirtle-card" src="./squirtle.png">
            <img id="hydro-photo" src="./hydro.png">
        </a-assets>

        <a-marker preset="hiro" id="marker-hiro"></a-marker>
        <a-marker preset="kanji" id="marker-kanji"></a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const uiContainer = document.querySelector('#ui-container');
        const uiTitle = document.querySelector('#ui-title');
        const uiDesc = document.querySelector('#ui-desc');
        const guideMsg = document.querySelector('#guide-msg');
        const popPokemonImg = document.querySelector('#pop-pokemon-img');
        const popFactoryImg = document.querySelector('#pop-factory-img');
        const learningBtn = document.querySelector('#learning-btn');

        const mHiro = document.querySelector('#marker-hiro');
        const mKanji = document.querySelector('#marker-kanji');

        // [핵심 해결책] 버튼을 눌러도 화면이 사라지지 않게 처리
        function completeLearning() {
            // 1. 브라우저 알림창을 띄워 학습 완료를 알림
            alert("축하합니다! 학습이 완료되었습니다.");
            
            // 2. 버튼 텍스트와 색상을 완료 상태로 변경 (팝업창은 그대로 유지되어 스크린샷 가능!)
            learningBtn.innerText = "✔ 학습 완료됨";
            learningBtn.classList.add('completed');
        }

        // 새로운 마커를 인식할 때마다 버튼 상태를 노란색으로 초기화
        function resetBtn() {
            learningBtn.innerText = "💛 학습 완료";
            learningBtn.classList.remove('completed');
        }

        // [마커 1] Hiro 비추면 무조건 꼬부기 작동
        mHiro.addEventListener('markerFound', () => {
            resetBtn();
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "💧 꼬부기 × 소양강 수력 발전소";
            uiDesc.innerText = "강력한 물줄기를 발사하는 꼬부기처럼, 수력 발전소는 높은 곳에서 쏟아지는 물의 강력한 위치 에너지를 이용하여 수차 터빈을 회전시켜 전기를 생산합니다.";
            popPokemonImg.src = "./squirtle.png";
            popFactoryImg.src = "./hydro.png";
        });

        // [마커 2] Kanji 비추면 무조건 파이리 작동
        mKanji.addEventListener('markerFound', () => {
            resetBtn();
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "🔥 파이리 × 당진 화력 발전소";
            uiDesc.innerText = "파이리의 강력한 불꽃 열에너지처럼, 화력 발전소는 연료를 연소할 때 발생하는 고온의 열로 물을 끓여 고압의 증기를 만들고 터빈을 돌려 전력을 생산합니다.";
            popPokemonImg.src = "./charmander.png";
            popFactoryImg.src = "./thermal.png";
        });

        // 마커가 카메라에서 완전히 사라졌을 때만 팝업 숨기기
        mHiro.addEventListener('markerLost', () => {
            uiContainer.style.display = 'none';
            guideMsg.style.display = 'block';
        });
        mKanji.addEventListener('markerLost', () => {
            uiContainer.style.display = 'none';
            guideMsg.style.display = 'block';
        });
    </script>
</body>
</html>
