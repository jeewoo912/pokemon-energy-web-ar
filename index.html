<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>에너지 가디언즈 AR 도감</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 15px; font-family: sans-serif; text-align: center;
            z-index: 9999; display: none; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        #ui-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #ffcb05; }
        #ui-desc { font-size: 14px; line-height: 1.4; margin-bottom: 10px; }
        #info-btn {
            background: #2a75bb; border: none; color: white; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        #guide-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); padding: 8px 15px; border-radius: 20px;
            font-size: 14px; font-weight: bold; z-index: 9999; border: 2px solid #2a75bb;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="guide-msg">포켓몬 카드를 카메라로 비춰주세요!</div>

    <div id="ui-container">
        <div id="ui-title">발전소 정보</div>
        <div id="ui-desc">내용</div>
        <button id="info-btn" onclick="alert('학습을 완료하여 에너지 마스터 도감에 등록되었습니다!')">학습 완료</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="pidgeot-pic" src="./pidgeot.png">
            <img id="wind-pic" src="./wind.png">
            
            <img id="charmander-pic" src="./charmander.png">
            <img id="thermal-pic" src="./thermal.png">
            
            <img id="squirtle-pic" src="./squirtle.png">
            <img id="hydro-pic" src="./hydro.png">
        </a-assets>

        <a-marker preset="hiro" id="wind-marker">
            <a-image src="#pidgeot-pic" position="-0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
            <a-image src="#wind-pic" position="0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-marker preset="kanji" id="thermal-marker">
            <a-image src="#charmander-pic" position="-0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
            <a-image src="#thermal-pic" position="0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-marker type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/patt.a" id="hydro-marker">
            <a-image src="#squirtle-pic" position="-0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
            <a-image src="#hydro-pic" position="0.6 0.2 0" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const windMarker = document.querySelector('#wind-marker');
        const thermalMarker = document.querySelector('#thermal-marker');
        const hydroMarker = document.querySelector('#hydro-marker');
        
        const uiContainer = document.querySelector('#ui-container');
        const uiTitle = document.querySelector('#ui-title');
        const uiDesc = document.querySelector('#ui-desc');
        const guideMsg = document.querySelector('#guide-msg');

        // 1. 풍력 이벤트
        windMarker.addEventListener('markerFound', () => {
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "🍃 피죤투 × 영덕 풍력 발전소";
            uiDesc.innerText = "거센 바람을 다루는 피죤투처럼, 풍력 발전소는 바람의 대류 현상을 이용해 날개를 회전시켜 무공해 전기를 만듭니다.";
        });

        // 2. 화력 이벤트
        thermalMarker.addEventListener('markerFound', () => {
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "🔥 파이리 × 당진 화력 발전소";
            uiDesc.innerText = "파이리의 강력한 불꽃처럼, 화력 발전소는 석탄이나 LNG를 태워 발생한 고압의 증기로 터빈을 돌려 전기를 생산합니다.";
        });

        // 3. 수력 이벤트
        hydroMarker.addEventListener('markerFound', () => {
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "💧 꼬부기 × 소양강 수력 발전소";
            uiDesc.innerText = "시원하게 물을 뿜는 꼬부기처럼, 수력 발전소는 높은 곳에서 떨어지는 물의 힘(위치 에너지)으로 수차를 돌려 전기를 만듭니다.";
        });

        // 마커가 사라졌을 때 UI 초기화
        const hideUI = () => {
            uiContainer.style.display = 'none';
            guideMsg.style.display = 'block';
        };
        windMarker.addEventListener('markerLost', hideUI);
        thermalMarker.addEventListener('markerLost', hideUI);
        hydroMarker.addEventListener('markerLost', hideUI);
    </script>
</body>
</html>
