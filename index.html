<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>에너지 가디언즈 AR 도감</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #guide-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 10px 20px; border-radius: 25px;
            font-size: 14px; font-weight: bold; z-index: 9999; border: 2px solid #2a75bb; font-family: sans-serif;
        }
        #ui-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 440px; background: rgba(15, 15, 15, 0.94); color: white;
            padding: 18px; border-radius: 16px; font-family: sans-serif;
            z-index: 9999; display: none; box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
        }
        #ui-title { font-size: 19px; font-weight: bold; margin-bottom: 12px; color: #ffcb05; text-align: center; }
        .img-flex-box { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .ui-preview-img { width: 48%; height: 125px; object-fit: contain; border-radius: 8px; background: #222; border: 1.5px solid rgba(255,255,255,0.3); }
        #ui-desc { font-size: 13.5px; line-height: 1.55; margin-bottom: 14px; text-align: justify; color: #f0f0f0; }
        
        /* 🔄 데이터 모드 전환 버튼 스타일 */
        #toggle-btn {
            background: #ffcb05; color: #111; border: none; padding: 10px 0;
            border-radius: 25px; width: 100%; font-weight: bold; font-size: 13.5px;
            margin-bottom: 10px; cursor: pointer; display: none; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #toggle-btn:active { opacity: 0.8; }

        #info-btn { 
            background: linear-gradient(135deg, #2a75bb, #3b82f6); border: none; 
            color: white; padding: 12px 0; border-radius: 25px; width: 100%; 
            font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        #info-btn:active { opacity: 0.7; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="guide-msg">화면에 테스트 마커(Hiro 또는 Kanji)를 비춰주세요!</div>

    <div id="ui-container">
        <div id="ui-title">발전소 분석 데이터</div>
        <div class="img-flex-box">
            <img id="pop-pokemon-img" class="ui-preview-img" src="">
            <img id="pop-factory-img" class="ui-preview-img" src="">
        </div>
        <div id="ui-desc">데이터 로딩 중...</div>
        
        <button id="toggle-btn" onclick="toggleHiroContent()">🍃 피죤투(풍력) 데이터 보기</button>
        
        <button id="info-btn" onclick="closeUI()">⚡ 학습 완료</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="pidgeot-card" src="./pidgeot.png">
            <img id="wind-photo" src="./wind.png">
            <img id="charmander-card" src="./charmander.png">
            <img id="thermal-photo" src="./thermal.png">
            <img id="squirtle-card" src="./squirtle.png">
            <img id="hydro-photo" src="./hydro.png">
        </a-assets>

        <a-marker preset="kanji" id="marker-charmander"></a-marker>
        
        <a-marker preset="hiro" id="marker-hiro-shared"></a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const uiContainer = document.querySelector('#ui-container');
        const uiTitle = document.querySelector('#ui-title');
        const uiDesc = document.querySelector('#ui-desc');
        const guideMsg = document.querySelector('#guide-msg');
        const popPokemonImg = document.querySelector('#pop-pokemon-img');
        const popFactoryImg = document.querySelector('#pop-factory-img');
        const toggleBtn = document.querySelector('#toggle-btn');

        const mCharmander = document.querySelector('#marker-charmander');
        const mHiroShared = document.querySelector('#marker-hiro-shared');

        // hiro 마커 탐색 모드 상태 변수 (squirtle 또는 pidgeot)
        let hiroMode = "squirtle"; 

        const dataSquirtle = {
            title: "💧 꼬부기 × 소양강 수력 발전소",
            desc: "강력한 물줄기를 발사하는 꼬부기처럼, 수력 발전소는 높은 곳에서 쏟아지는 물의 강력한 위치 에너지를 이용하여 수차 터빈을 회전시켜 전기를 생산합니다.",
            poke: "./squirtle.png",
            fact: "./hydro.png"
        };

        const dataPidgeot = {
            title: "🍃 피죤투 × 영덕 풍력 발전소",
            desc: "거센 바람을 자유자재로 다루는 피죤투의 특성처럼, 풍력 발전소는 자연적인 바람의 흐름을 이용하여 대형 날개를 회전시키고 청정 전기에너지로 변환합니다.",
            poke: "./pidgeot.png",
            fact: "./wind.png"
        };

        // [마커 1] 파이리(Kanji) 감지시 실행
        mCharmander.addEventListener('markerFound', () => {
            toggleBtn.style.display = 'none'; 
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            uiTitle.innerText = "🔥 파이리 × 당진 화력 발전소";
            uiDesc.innerText = "파이리의 강력한 불꽃 열에너지처럼, 화력 발전소는 연료를 연소할 때 발생하는 고온의 열로 물을 끓여 고압의 증기를 만들고 터빈을 돌려 전력을 생산합니다.";
            popPokemonImg.src = "./charmander.png";
            popFactoryImg.src = "./thermal.png";
        });

        // [마커 2] 꼬부기/피죤투(Hiro) 감지시 실행
        mHiroShared.addEventListener('markerFound', () => {
            toggleBtn.style.display = 'block'; 
            guideMsg.style.display = 'none';
            uiContainer.style.display = 'block';
            hiroMode = "squirtle"; // 처음 마커 대면 꼬부기부터 시작
            updateHiroUI();
        });

        // 노란색 버튼을 누르면 꼬부기 <-> 피죤투 데이터가 스위칭되는 함수
        function toggleHiroContent() {
            hiroMode = (hiroMode === "squirtle") ? "pidgeot" : "squirtle";
            updateHiroUI();
        }

        // 상태에 맞춰 화면을 갱신해주는 함수
        function updateHiroUI() {
            if (hiroMode === "squirtle") {
                uiTitle.innerText = dataSquirtle.title;
                uiDesc.innerText = dataSquirtle.desc;
                popPokemonImg.src = dataSquirtle.poke;
                popFactoryImg.src = dataSquirtle.fact;
                toggleBtn.innerText = "🍃 피죤투(풍력) 데이터 보기";
                toggleBtn.style.background = "#ffcb05";
                toggleBtn.style.color = "#111";
            } else {
                uiTitle.innerText = dataPidgeot.title;
                uiDesc.innerText = dataPidgeot.desc;
                popPokemonImg.src = dataPidgeot.poke;
                popFactoryImg.src = dataPidgeot.fact;
                toggleBtn.innerText = "💧 꼬부기(수력) 데이터 보기";
                toggleBtn.style.background = "#2a75bb";
                toggleBtn.style.color = "white";
            }
        }

        // 팝업 닫기 함수
        function closeUI() {
            uiContainer.style.display = 'none';
            guideMsg.style.display = 'block';
        }

        mCharmander.addEventListener('markerLost', closeUI);
        mHiroShared.addEventListener('markerLost', closeUI);
    </script>
</body>
</html>
